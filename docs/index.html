<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CABINET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:1400px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
    align-items:center;
}

h1{
    font-size:5rem;
    color:#00ffcc;
    text-shadow:0 0 20px #00ffcc;
}

.tagline{
    font-size:1.4rem;
    margin:20px 0;
    color:#ccc;
}

.description{
    line-height:1.7;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    padding:15px 30px;
    text-decoration:none;
    background:#00ffcc;
    color:black;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 25px #00ffcc;
}

.pc-frame{
    background:#202020;
    border-radius:25px;
    padding:20px;
    border:8px solid #444;
    box-shadow:0 0 40px rgba(0,255,204,.3);
}

.pc-screen{
    background:black;
    border-radius:10px;
    overflow:hidden;
}

.pc-screen img{
    width:100%;
    display:block;
}

.pc-stand{
    width:120px;
    height:20px;
    background:#555;
    margin:auto;
    margin-top:15px;
    border-radius:10px;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }

    h1{
        font-size:3rem;
    }
}
</style>
</head>
<body>

<div class="container">

<div>
<h1>🕹️ THE CABINET</h1>

<p class="tagline">
Offline Retro Gaming. Modern Launcher.
</p>

<p class="description">
THE CABINET is a lightweight offline game launcher packed with classic arcade experiences. Play StreetFight, Tetris, Snake, NEONRACE, Water Sort, Pong and more — all without an internet connection.
</p>

<div class="buttons">
<a href="installation.html" class="btn">Install</a>
<a href="import.html" class="btn">Import Games</a>
</div>

</div>

<div>
<div class="pc-frame">
<div class="pc-screen">
<img src="scr.png" alt="THE CABINET Screenshot">
</div>
</div>
<div class="pc-stand"></div>
</div>

</div>

</body>
</html>
